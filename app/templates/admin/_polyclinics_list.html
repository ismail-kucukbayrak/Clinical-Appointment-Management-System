<div class="admin-list-header">
    <h2>Polyclinics</h2>
    <button type="button" class="btn btn-small"
            hx-get="/admin/polyclinics/add-form" hx-target="#admin-form-area" hx-swap="innerHTML">
        + Add Polyclinic
    </button>
</div>
<table>
    <thead><tr><th>Name</th><th></th></tr></thead>
    <tbody>
        {% for polyclinic in polyclinics %}
        <tr>
            <td>{{ polyclinic.name }}</td>
            <td>
                <form hx-post="/admin/polyclinics/{{ polyclinic.id }}/delete"
                      hx-target="#admin-list-area" hx-swap="innerHTML"
                      hx-confirm="Delete this polyclinic? This will also remove its doctors.">
                    <button type="submit" class="btn-small danger">Delete</button>
                </form>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="2" class="empty-state">No polyclinics yet.</td></tr>
        {% endfor %}
    </tbody>
</table>
