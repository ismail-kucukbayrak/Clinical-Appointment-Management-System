<div class="card">
    <h2>Add Doctor</h2>
    <form hx-post="/admin/doctors" hx-target="#admin-list-area" hx-swap="innerHTML">
        <label for="doctor_full_name">Full Name</label>
        <input type="text" id="doctor_full_name" name="full_name" required autofocus>

        <label for="doctor_national_id">National ID</label>
        <input type="text" id="doctor_national_id" name="national_id" pattern="\d{11}" maxlength="11"
               inputmode="numeric" autocomplete="off"
               oninput="this.value = this.value.replace(/\D/g, '').slice(0, 11)" required>

        <label for="doctor_password">Password</label>
        <input type="password" id="doctor_password" name="password" required>

        <label for="doctor_polyclinic_id">Polyclinic</label>
        <select id="doctor_polyclinic_id" name="polyclinic_id" required>
            <option value="">Select a polyclinic</option>
            {% for polyclinic in polyclinics %}
            <option value="{{ polyclinic.id }}">{{ polyclinic.name }}</option>
            {% endfor %}
        </select>

        <button type="submit">Add Doctor</button>
    </form>
    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}
</div>
